events { worker_connections 1024; }

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;
  client_max_body_size 50M;

  # Renouvellement Let's Encrypt (HTTP)
  server {
    listen 80;
    server_name nc.groupe-nissi.com api.nc.groupe-nissi.com;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── Frontend — nc.groupe-nissi.com ──
  server {
    listen 443 ssl;
    server_name nc.groupe-nissi.com;

    ssl_certificate     /etc/letsencrypt/live/nc.groupe-nissi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nc.groupe-nissi.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
      proxy_pass         http://frontend:3000;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }

  # ── Backend API — api.nc.groupe-nissi.com ──
  server {
    listen 443 ssl;
    server_name api.nc.groupe-nissi.com;

    ssl_certificate     /etc/letsencrypt/live/nc.groupe-nissi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nc.groupe-nissi.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Fichiers uploadés servis directement par Nginx
    location /uploads/ {
      alias /uploads/;
      expires 30d;
      add_header Cache-Control "public, immutable";
    }

    # API NestJS
    location / {
      proxy_pass         http://backend:3001;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        'upgrade';
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      # Support SSE (Server-Sent Events)
      proxy_buffering    off;
      proxy_read_timeout 3600s;
    }
  }
}
