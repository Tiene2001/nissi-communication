version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nissi_postgres
    environment:
      POSTGRES_USER: nissi_user
      POSTGRES_PASSWORD: nissi_pass2026
      POSTGRES_DB: nissi_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nissi_user -d nissi_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nissi_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
