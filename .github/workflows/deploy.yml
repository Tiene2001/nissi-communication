name: Deploy — NISSI Communication

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: self-hosted

    steps:
      - name: Deploy
        run: |
          set -e
          echo "=== Pull du code ==="
          cd /opt/nissi-communication
          git pull origin main

          echo "=== Build et redémarrage ==="
          docker compose -f docker-compose.prod.yml up --build --force-recreate -d

          echo "=== Nettoyage images inutilisées ==="
          docker image prune -f

          echo "=== Déploiement terminé ==="
